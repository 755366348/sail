name: Build macOS Apple Silicon

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-arm64:
    name: Build macOS ARM64 installer
    runs-on: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build macOS application
        run: $HOME/go/bin/wails build -platform darwin/arm64 -clean

      - name: Create DMG installer
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/staging
          cp -R build/bin/sail.app dist/staging/Sail.app
          ln -s /Applications dist/staging/Applications
          hdiutil create -volname "Sail" -srcfolder dist/staging -ov -format UDZO dist/sail-macos-arm64.dmg

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: sail-macos-arm64
          path: dist/sail-macos-arm64.dmg
          if-no-files-found: error
